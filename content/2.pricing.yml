faq:
  title: Pertanyaan yang Sering Diajukan
  description: Punya pertanyaan? Kami siap membantu. Hubungi kami via WhatsApp jika tidak ada di sini.
  items:
    - label: Berapa lama waktu pengerjaan website?
      content: Paket Starter selesai dalam 7-14 hari kerja, Paket Pro 14-30 hari. Waktu bisa lebih cepat tergantung kesiapan konten dari klien.
    - label: Apakah website sudah responsif di HP dan tablet?
      content: Ya, semua website yang kami buat sudah 100% responsif dan dioptimalkan untuk tampil sempurna di semua ukuran layar.
    - label: Apakah ada garansi setelah website selesai?
      content: Ya! Paket Starter mendapat 1 bulan support gratis, Paket Pro mendapat 3 bulan maintenance. Bug dan error kami perbaiki tanpa biaya tambahan.
    - label: Berapa biaya pembuatan website?
      content: Paket Starter mulai Rp350.000 sekali bayar (5-10 halaman + hosting + domain). Paket Pro mulai Rp1.500.000 dengan fitur lengkap. Konsultasi gratis untuk custom project.
    - label: Apakah bisa revisi desain?
      content: Tentu! Paket Starter sudah termasuk 2x revisi gratis. Paket Pro revisi tidak terbatas selama masa pengerjaan.
    - label: Apakah sudah termasuk domain bisnis (.com, .id) dan server?
      content: Paket Starter dan Pro sudah termasuk hosting dan domain selama 1 tahun. Untuk Paket Hosting & Domain, kami bantu setup di hosting pilihan Anda.
